<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="manifest" href="manifest.json">

<title>FaithGuide</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #f5f5f5, #e6e6e6);
}

/* NAV */
.nav {
  background:#16263d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-links {
  display:flex;
  gap:25px;
  font-size:14px;
}

.nav-links span {
  cursor:pointer;
  opacity:0.9;
}

.nav-links span:hover {
  opacity:1;
  text-decoration:underline;
}

/* CARDS */
.card {
  background:white;
  padding:30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  border:1px solid #eee;
  cursor:pointer;
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.icon {
  width:50px;
  height:50px;
  margin:0 auto 12px;
  border-radius:12px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card h3 {
  color:#c9a94d;
}

.card p {
  color:#666;
  font-size:14px;
}

/* VERSES */
.verse-card {
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  margin:25px auto;
  max-width:700px;
}

.verse-ref {
  font-size:12px;
  color:#c9a94d;
  margin-bottom:10px;
}

.verse-text {
  display:flex;
  gap:15px;
  font-size:20px;
}

.verse-line {
  width:3px;
  background:#c9a94d;
}

.save-btn {
  margin-top:15px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#c9a94d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div style="color:#d4af37; font-weight:bold;">FaithGuide</div>

  <div style="display:flex; gap:25px; font-size:14px; align-items:center;">
    <span onclick="goHome()">Home</span>
    <span onclick="showSaved()">Saved</span>
    <span>Devotionals</span>
    <span>Reading Plans</span>
    <span>Bible</span>
  </div>
</div>

<!-- HERO -->
<div style="background:#1b2f4b; color:white; padding:60px 20px; text-align:center;">
  <h1>FaithGuide</h1>
  <p>"Come to me, all who are weary and burdened, and I will give you rest."</p>
  <p style="color:#d4af37;">— Matthew 11:28</p>
</div>

<!-- DAILY VERSE -->
<script>
const dailyVerses = [
  "Psalm 23:1 — The Lord is my shepherd; I shall not want.",
  "Isaiah 41:10 — Fear not, for I am with you.",
  "Philippians 4:13 — I can do all things through Christ.",
  "Matthew 11:28 — Come to me, all who are weary.",
  "Romans 8:28 — All things work together for good."
];

function showDailyVerse() {
  const today = new Date().getDate();
  const verse = dailyVerses[today % dailyVerses.length];

  const box = document.createElement("div");
  box.style = "max-width:600px; margin:30px auto; padding:20px; background:white; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.08); text-align:center;";
  box.innerHTML = `
    <div style="font-size:12px; color:#c9a94d;">DAILY VERSE</div>
    <div style="display:flex; gap:12px; justify-content:center;">
      <div style="width:3px; background:#c9a94d;"></div>
      <div>"${verse}"</div>
    </div>
  `;
  document.body.appendChild(box);
}
showDailyVerse();
</script>

<!-- SEARCH (FIXED LOCATION) -->
<div style="text-align:center; padding:40px 20px 20px;">
  <h2 style="color:#c9a94d; font-size:36px; margin-bottom:10px;">
    How are you feeling today?
  </h2>

  <p style="color:#555; margin-bottom:20px;">

      type="text" 
      placeholder="Search for verses, topics, or emotions..."
      style="padding:12px 15px; width:300px; border-radius:8px; border:1px solid #ddd;"
    />

    <button 
      style="padding:12px 20px; border:none; border-radius:8px; background:#c9a94d; color:white; cursor:pointer;">
      🔍 Find Verses
    </button>

  </div>
</div>
