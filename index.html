<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FaithGuide</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1f3a;
  color: #fff;
}

header {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #08172b;
  position: sticky;
  top: 0;
}

header button {
  background: none;
  border: none;
  color: #d4af37;
  font-size: 14px;
}

.screen {
  display: none;
  padding: 15px;
}

.active {
  display: block;
}

.hero {
  background: #122b4d;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 15px;
}

.search {
  width: 100%;
  padding: 10px;
  border-radius: 10px;
  border: none;
  margin-bottom: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.card {
  background: #122b4d;
  padding: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  cursor: pointer;
}

.verse-card {
  background: #122b4d;
  padding: 15px;
  border-radius: 12px;
  margin-bottom: 10px;
  position: relative;
  border-left: 5px solid #d4af37;
}

.verse-ref {
  color: #d4af37;
  font-weight: bold;
}

.save-btn {
  position: absolute;
  right: 10px;
  top: 10px;
  background: #d4af37;
  border: none;
  border-radius: 6px;
  padding: 5px 8px;
  cursor: pointer;
}

.back-btn {
  margin-bottom: 10px;
  background: #d4af37;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>
  <button onclick="showScreen('home')">Home</button>
  <button onclick="showScreen('saved')">Saved</button>
  <button onclick="showScreen('devotionals')">Devotionals</button>
  <button onclick="showScreen('plans')">Reading Plans</button>
  <button onclick="showScreen('bible')">Bible</button>
</header>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="hero">
    <h3>Daily Verse</h3>
    <p>"The Lord is my shepherd; I shall not want." — Psalm 23:1</p>
  </div>

  <input class="search" placeholder="Search...">

  <h3>How are you feeling today?</h3>

  <div class="grid" id="emotionGrid"></div>
</div>

<!-- EMOTION -->
<div id="emotion" class="screen">
  <button class="back-btn" onclick="showScreen('home')">Back</button>
  <h2 id="emotionTitle"></h2>
  <p id="emotionSubtitle"></p>
  <div id="verseList"></div>
</div>

<!-- SAVED -->
<div id="saved" class="screen">
  <h2>Saved Verses</h2>
  <div id="savedList"></div>
</div>

<!-- DEVOTIONALS -->
<div id="devotionals" class="screen">
  <h2>Devotionals</h2>
  <p>Coming soon...</p>
</div>

<!-- PLANS -->
<div id="plans" class="screen">
  <h2>Reading Plans</h2>
  <p>Coming soon...</p>
</div>

<!-- BIBLE -->
<div id="bible" class="screen">
  <h2>Bible</h2>
  <p>Coming soon...</p>
</div>

<script>
const emotions = ["Anxiety","Stress","Fear","Grief","Anger","Loneliness","Confusion","Joy","Gratitude"];

const verses = {
Anxiety: [
{ ref: "Matthew 6:34", text: "Take therefore no thought for the morrow: for the morrow shall take thought for the things of itself." },
{ ref: "Philippians 4:6", text: "Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God." }
],
Stress: [
{ ref: "Psalm 55:22", text: "Cast thy burden upon the Lord, and he shall sustain thee." }
],
Fear: [
{ ref: "Isaiah 41:10", text: "Fear thou not; for I am with thee: be not dismayed; for I am thy God." }
],
Grief: [
{ ref: "Psalm 34:18", text: "The Lord is nigh unto them that are of a broken heart." }
],
Anger: [
{ ref: "Ephesians 4:26", text: "Be ye angry, and sin not: let not the sun go down upon your wrath." }
],
Loneliness: [
{ ref: "Deuteronomy 31:6", text: "He will not fail thee, nor forsake thee." }
],
Confusion: [
{ ref: "1 Corinthians 14:33", text: "For God is not the author of confusion, but of peace." }
],
Joy: [
{ ref: "Psalm 16:11", text: "In thy presence is fullness of joy." }
],
Gratitude: [
{ ref: "1 Thessalonians 5:18", text: "In every thing give thanks." }
]
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === "saved") loadSaved();
}

function loadEmotions() {
  const grid = document.getElementById('emotionGrid');
  emotions.forEach(emotion => {
    const div = document.createElement('div');
    div.className = "card";
    div.innerText = emotion;
    div.onclick = () => openEmotion(emotion);
    grid.appendChild(div);
  });
}

function openEmotion(emotion) {
  showScreen('emotion');
  document.getElementById('emotionTitle').innerText = emotion;
  document.getElementById('emotionSubtitle').innerText = "What the Bible says about " + emotion.toLowerCase();

  const list = document.getElementById('verseList');
  list.innerHTML = "";

  verses[emotion].forEach(v => {
    const card = document.createElement('div');
    card.className = "verse-card";

    card.innerHTML = `
      <div class="verse-ref">${v.ref}</div>
      <p>${v.text}</p>
      <button class="save-btn">Save</button>
    `;

    card.querySelector('button').onclick = () => saveVerse(v);

    list.appendChild(card);
  });
}

function saveVerse(verse) {
  let saved = JSON.parse(localStorage.getItem("savedVerses")) || [];
  saved.push(verse);
  localStorage.setItem("savedVerses", JSON.stringify(saved));
  alert("Saved!");
}

function loadSaved() {
  const list = document.getElementById('savedList');
  list.innerHTML = "";

  let saved = JSON.parse(localStorage.getItem("savedVerses")) || [];

  saved.forEach(v => {
    const card = document.createElement('div');
    card.className = "verse-card";

    card.innerHTML = `
      <div class="verse-ref">${v.ref}</div>
      <p>${v.text}</p>
    `;

    list.appendChild(card);
  });
}

loadEmotions();
</script>

</body>
</html>
