<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FaithGuide</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #f5f5f5, #e6e6e6);
}

.nav {
  background:#16263d;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
}

.screen {
  display:none;
}

.active {
  display:block;
}

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  cursor:pointer;
}

.card h3 { color:#c9a94d; }

.verse-card {
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  margin:20px auto;
  max-width:700px;
}

.save-btn {
  margin-top:10px;
  background:#c9a94d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
}
</style>
</head>

<body>

<div class="nav">
  <div>FaithGuide</div>
  <div onclick="goHome()" style="cursor:pointer;">Home</div>
</div>

<div id="home" class="screen active" style="padding:20px;">
<h2 style="text-align:center; color:#c9a94d;">How are you feeling today?</h2>

<div style="display:grid; gap:15px; margin-top:20px;">

<div class="card" onclick="openEmotion('Anxiety')">
<h3>Anxiety</h3>
<p>Find peace when worry overwhelms you</p>
</div>

<div class="card" onclick="openEmotion('Stress')">
<h3>Stress</h3>
<p>Discover rest in pressure</p>
</div>

<div class="card" onclick="openEmotion('Fear')">
<h3>Fear</h3>
<p>Build courage through God's promises</p>
</div>

</div>
</div>

<div id="verses" class="screen" style="padding:20px;">
<h2 id="emotionTitle" style="text-align:center; color:#c9a94d;"></h2>
<p style="text-align:center;">What the Bible says</p>

<div id="verseList"></div>

<div style="text-align:center; margin-top:20px;">
<button onclick="goHome()">← Back</button>
</div>
</div>

<script>

const verses = {

Anxiety: [
"Matthew 6:34 — Take therefore no thought for the morrow: for the morrow shall take thought for the things of itself.",
"Philippians 4:6 — Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God."
],

Stress: [
"Matthew 11:28 — Come unto me, all ye that labour and are heavy laden, and I will give you rest.",
"Psalm 55:22 — Cast thy burden upon the Lord, and he shall sustain thee."
],

Fear: [
"Isaiah 41:10 — Fear thou not; for I am with thee.",
"2 Timothy 1:7 — For God hath not given us the spirit of fear."
]

};

function openEmotion(emotion) {
  document.getElementById("home").classList.remove("active");
  document.getElementById("verses").classList.add("active");

  document.getElementById("emotionTitle").innerText = emotion;

  const container = document.getElementById("verseList");
  container.innerHTML = "";

  verses[emotion].forEach(v => {
    const parts = v.split("—");

    container.innerHTML += `
      <div class="verse-card">
        <div style="color:#c9a94d; font-size:12px;">${parts[0]}</div>
        <div style="margin-top:10px;">"${parts[1]}"</div>
        <button class="save-btn" onclick="saveVerse('${v}')">Save</button>
      </div>
    `;
  });
}

function goHome() {
  document.getElementById("verses").classList.remove("active");
  document.getElementById("home").classList.add("active");
}

function saveVerse(v) {
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  saved.push(v);
  localStorage.setItem("saved", JSON.stringify(saved));
  alert("Saved!");
}

</script>

</body>
</html>
