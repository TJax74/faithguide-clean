<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="manifest" href="manifest.json">

<title>FaithGuide</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #f5f5f5, #e6e6e6);
}

/* NAV */
.nav {
  background:#16263d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.nav-links {
  display:flex;
  gap:25px;
  font-size:14px;
}

.nav-links span {
  cursor:pointer;
  opacity:0.9;
}

.nav-links span:hover {
  opacity:1;
  text-decoration:underline;
}

/* CARDS */
.card {
  background:white;
  padding:30px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  border:1px solid #eee;
  cursor:pointer;
  transition: all 0.2s ease;
}

.card:hover {
  transform: translateY(-4px);
}

.icon {
  width:50px;
  height:50px;
  margin:0 auto 12px;
  border-radius:12px;
  background:#f7f7f7;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card h3 {
  color:#c9a94d;
}

.card p {
  color:#666;
  font-size:14px;
}

/* VERSES */
.verse-card {
  background:white;
  padding:30px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  margin:25px auto;
  max-width:700px;
}

.verse-ref {
  font-size:12px;
  color:#c9a94d;
  margin-bottom:10px;
}

.verse-text {
  display:flex;
  gap:15px;
  font-size:20px;
}

.verse-line {
  width:3px;
  background:#c9a94d;
}

.save-btn {
  margin-top:15px;
  padding:8px 14px;
  border:none;
  border-radius:6px;
  background:#c9a94d;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <div style="color:#d4af37; font-weight:bold;">FaithGuide</div>

  <div style="display:flex; gap:25px; font-size:14px; align-items:center;">
    <span style="cursor:pointer;" onclick="goHome()">Home</span>
    <span style="cursor:pointer;" onclick="showSaved()">Saved</span>
    <span style="cursor:pointer;">Devotionals</span>
    <span style="cursor:pointer;">Reading Plans</span>
    <span style="cursor:pointer;">Bible</span>
  </div>
</div>

<!-- HERO -->
<div style="background:#1b2f4b; color:white; padding:60px 20px; text-align:center;">
  <h1>FaithGuide</h1>
  <p>"Come to me, all who are weary and burdened, and I will give you rest."</p>
  <p style="color:#d4af37;">— Matthew 11:28</p>
</div>

<!-- DAILY VERSE -->
<script>
const dailyVerses = [
  "Psalm 23:1 — The Lord is my shepherd; I shall not want.",
  "Isaiah 41:10 — Fear not, for I am with you.",
  "Philippians 4:13 — I can do all things through Christ.",
  "Matthew 11:28 — Come to me, all who are weary.",
  "Romans 8:28 — All things work together for good."
];

function showDailyVerse() {
  const today = new Date().getDate();
  const verse = dailyVerses[today % dailyVerses.length];

  const box = document.createElement("div");
  box.style = "max-width:600px; margin:30px auto; padding:20px; background:white; border-radius:12px; box-shadow:0 6px 15px rgba(0,0,0,0.08); text-align:center;";
  box.innerHTML = `
    <div style="font-size:12px; color:#c9a94d;">DAILY VERSE</div>
    <div style="display:flex; gap:12px; justify-content:center;">
      <div style="width:3px; background:#c9a94d;"></div>
      <div>"${verse}"</div>
    </div>
  `;
  document.body.appendChild(box);
}
showDailyVerse();
</script>

<!-- CARDS -->
<div id="homeSection" style="padding:40px;">
  <div style="max-width:1100px; margin:auto; display:grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap:20px;">

    <div class="card" onclick="showVerses('Anxiety')"><h3>Anxiety</h3></div>
    <div class="card" onclick="showVerses('Stress')"><h3>Stress</h3></div>
    <div class="card" onclick="showVerses('Fear')"><h3>Fear</h3></div>
    <div class="card" onclick="showVerses('Grief')"><h3>Grief</h3></div>
    <div class="card" onclick="showVerses('Anger')"><h3>Anger</h3></div>
    <div class="card" onclick="showVerses('Loneliness')"><h3>Loneliness</h3></div>
    <div class="card" onclick="showVerses('Confusion')"><h3>Confusion</h3></div>
    <div class="card" onclick="showVerses('Joy')"><h3>Joy</h3></div>
    <div class="card" onclick="showVerses('Gratitude')"><h3>Gratitude</h3></div>

  </div>
</div>

<!-- VERSES -->
<div id="versesSection" style="display:none; padding:40px;">
  <h2 id="emotionTitle"></h2>
  <div id="versesContainer"></div>
</div>

<!-- SAVED -->
<div id="savedSection" style="display:none; padding:40px;">
  <h2>Saved Verses</h2>
  <div id="savedContainer"></div>
</div>

<script>
const verses = {
  Anxiety: ["Matthew 6:34 — Take no thought for tomorrow..."],
  Stress: ["Matthew 11:28 — Come to me..."]
};

function showVerses(emotion) {
  document.getElementById("homeSection").style.display = "none";
  document.getElementById("savedSection").style.display = "none";
  document.getElementById("versesSection").style.display = "block";

  document.getElementById("emotionTitle").innerText = emotion;

  const container = document.getElementById("versesContainer");
  container.innerHTML = "";

  verses[emotion].forEach(v => {
    const [ref, text] = v.split("—");

    container.innerHTML += `
      <div class="verse-card">
        <div class="verse-ref">${ref}</div>
        <div class="verse-text">
          <div class="verse-line"></div>
          <div>"${text}"</div>
        </div>
        <button class="save-btn" onclick="saveVerse('${v}')">Save</button>
      </div>
    `;
  });
}

function saveVerse(v) {
  let saved = JSON.parse(localStorage.getItem("saved")) || [];
  saved.push(v);
  localStorage.setItem("saved", JSON.stringify(saved));
  alert("Saved!");
}

function showSaved() {
  document.getElementById("homeSection").style.display = "none";
  document.getElementById("versesSection").style.display = "none";
  document.getElementById("savedSection").style.display = "block";

  const container = document.getElementById("savedContainer");
  container.innerHTML = "";

  const saved = JSON.parse(localStorage.getItem("saved")) || [];

  saved.forEach(v => {
    container.innerHTML += `<div class="verse-card">${v}</div>`;
  });
}

function goHome() {
  document.getElementById("homeSection").style.display = "block";
  document.getElementById("versesSection").style.display = "none";
  document.getElementById("savedSection").style.display = "none";
}
</script>

</body>
</html>
