<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>FaithGuide</title>

<style>
body {
  margin: 0;
  font-family: Georgia, serif;
  background: linear-gradient(to bottom, #f5f5f5, #e6e6e6);
}

.nav {
  background:#16263d;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
}

.nav span {
  margin-left:15px;
  cursor:pointer;
}

.screen { display:none; }
.active { display:block; }

.card {
  background:white;
  padding:25px;
  border-radius:16px;
  text-align:center;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  cursor:pointer;
}

.card h3 { color:#c9a94d; }

.verse-card {
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 6px 15px rgba(0,0,0,0.08);
  margin:20px auto;
  max-width:700px;
  border-left:5px solid #c9a94d;
}

.save-btn {
  margin-top:10px;
  background:#c9a94d;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:6px;
  cursor:pointer;
}

.center { text-align:center; }
</style>
</head>

<body>

<div class="nav">
  <div>FaithGuide</div>
  <div>
    <span onclick="showScreen('home')">Home</span>
    <span onclick="showScreen('saved')">Saved</span>
    <span onclick="showScreen('devotionals')">Devotionals</span>
    <span onclick="showScreen('plans')">Plans</span>
    <span onclick="showScreen('bible')">Bible</span>
  </div>
</div>

<!-- HOME -->
<div id="home" class="screen active" style="padding:20px;">
<h2 class="center" style="color:#c9a94d;">How are you feeling today?</h2>

<div style="display:grid; gap:15px; margin-top:20px;">

<div class="card" onclick="openEmotion('Anxiety')"><h3>Anxiety</h3></div>
<div class="card" onclick="openEmotion('Stress')"><h3>Stress</h3></div>
<div class="card" onclick="openEmotion('Fear')"><h3>Fear</h3></div>
<div class="card" onclick="openEmotion('Grief')"><h3>Grief</h3></div>
<div class="card" onclick="openEmotion('Anger')"><h3>Anger</h3></div>
<div class="card" onclick="openEmotion('Loneliness')"><h3>Loneliness</h3></div>
<div class="card" onclick="openEmotion('Confusion')"><h3>Confusion</h3></div>
<div class="card" onclick="openEmotion('Joy')"><h3>Joy</h3></div>
<div class="card" onclick="openEmotion('Gratitude')"><h3>Gratitude</h3></div>

</div>
</div>

<!-- EMOTION -->
<div id="verses" class="screen" style="padding:20px;">
<h2 id="emotionTitle" class="center" style="color:#c9a94d;"></h2>
<p class="center" id="emotionSubtitle"></p>

<div id="verseList"></div>

<div class="center">
<button onclick="showScreen('home')">← Back</button>
</div>
</div>

<!-- SAVED -->
<div id="saved" class="screen" style="padding:20px;">
<h2 class="center" style="color:#c9a94d;">Saved Verses</h2>
<div id="savedList"></div>
</div>

<!-- DEVOTIONALS -->
<div id="devotionals" class="screen" style="padding:20px;">
<h2 class="center">Devotionals</h2>
<p class="center">Coming soon...</p>
</div>

<!-- PLANS -->
<div id="plans" class="screen" style="padding:20px;">
<h2 class="center">Reading Plans</h2>
<p class="center">Coming soon...</p>
</div>

<!-- BIBLE -->
<div id="bible" class="screen" style="padding:20px;">
<h2 class="center">Bible</h2>
<p class="center">Coming soon...</p>
</div>

<script>

const verses = {
Anxiety: [
{ ref:"Matthew 6:34", text:"Take therefore no thought for the morrow: for the morrow shall take thought for the things of itself." },
{ ref:"Philippians 4:6", text:"Be careful for nothing; but in every thing by prayer and supplication with thanksgiving let your requests be made known unto God." }
],
Stress: [
{ ref:"Matthew 11:28", text:"Come unto me, all ye that labour and are heavy laden, and I will give you rest." }
],
Fear: [
{ ref:"Isaiah 41:10", text:"Fear thou not; for I am with thee." }
],
Grief: [
{ ref:"Psalm 34:18", text:"The Lord is nigh unto them that are of a broken heart." }
],
Anger: [
{ ref:"Ephesians 4:26", text:"Be ye angry, and sin not." }
],
Loneliness: [
{ ref:"Deuteronomy 31:6", text:"He will not fail thee, nor forsake thee." }
],
Confusion: [
{ ref:"1 Corinthians 14:33", text:"God is not the author of confusion, but of peace." }
],
Joy: [
{ ref:"Psalm 16:11", text:"In thy presence is fullness of joy." }
],
Gratitude: [
{ ref:"1 Thessalonians 5:18", text:"In every thing give thanks." }
]
};

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(id === "saved") loadSaved();
}

function openEmotion(emotion) {
  showScreen('verses');

  document.getElementById("emotionTitle").innerText = emotion;
  document.getElementById("emotionSubtitle").innerText =
    "What the Bible says about " + emotion.toLowerCase();

  const container = document.getElementById("verseList");
  container.innerHTML = "";

  verses[emotion].forEach(v => {
    container.innerHTML += `
      <div class="verse-card">
        <div style="color:#c9a94d; font-size:14px;">${v.ref}</div>
        <div style="margin-top:10px;">"${v.text}"</div>
        <button class="save-btn" onclick='saveVerse(${JSON.stringify(v)})'>Save</button>
      </div>
    `;
  });
}

function saveVerse(v) {
  let saved = JSON.parse(localStorage.getItem("saved")) || [];

  if(!saved.find(s => s.ref === v.ref && s.text === v.text)) {
    saved.push(v);
  }

  localStorage.setItem("saved", JSON.stringify(saved));
  alert("Saved!");
}

function loadSaved() {
  const container = document.getElementById("savedList");
  container.innerHTML = "";

  let saved = JSON.parse(localStorage.getItem("saved")) || [];

  saved.forEach(v => {
    container.innerHTML += `
      <div class="verse-card">
        <div style="color:#c9a94d;">${v.ref}</div>
        <div style="margin-top:10px;">"${v.text}"</div>
      </div>
    `;
  });
}

</script>

</body>
</html>
